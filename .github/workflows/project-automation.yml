name: Project Automation

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-project:
    name: Add to Project
    if: vars.PROJECT_URL != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          # คุณต้องตั้งค่า PROJECT_URL ใน Repository Secrets หรือ Variables
          # ตัวอย่าง: https://github.com/users/bl1nk-bot/projects/1
          project-url: ${{ vars.PROJECT_URL || 'https://github.com/users/bl1nk-bot/projects/1' }}
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
